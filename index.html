<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>반찬 배달 봉사</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
  :root {
    --bg: #F5F0E8; --card: #FFFDF7; --accent: #E05C2A;
    --text: #1A1208; --muted: #8C7B5E; --done: #4CAF7D; --border: #DDD5C0;
    --area1: #E05C2A; --area2: #2A7AE0; --area3: #4CAF7D;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .screen { display: none; }
  .screen.active { display: block; }

  /* SCREEN 1 */
  .pick-header { background: var(--text); color: var(--bg); padding: 32px 24px 24px; }
  .pick-header h1 { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 6px; }
  .pick-header h1 span { color: var(--accent); }
  .pick-header p { font-size: 13px; color: rgba(245,240,232,0.55); line-height: 1.6; }
  .pick-selected-bar { margin: 16px 24px 0; background: var(--card); border: 2px solid var(--border); border-radius: 14px; padding: 13px 16px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .pick-selected-bar .count { font-size: 14px; font-weight: 700; }
  .pick-selected-bar .count span { color: var(--accent); font-size: 20px; }
  .pick-confirm-btn { padding: 10px 20px; background: var(--accent); color: white; border: none; border-radius: 10px; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }
  .pick-confirm-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
  .pick-list { padding: 16px 24px 100px; display: flex; flex-direction: column; gap: 8px; }
  .alpha-label { font-size: 12px; font-weight: 900; color: var(--muted); padding: 10px 4px 4px; letter-spacing: 0.08em; }
  .pick-item { background: var(--card); border: 2px solid var(--border); border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.18s; user-select: none; }
  .pick-item:active { transform: scale(0.98); }
  .pick-item.selected { border-color: var(--accent); background: #FFF5F0; }
  .pick-check { width: 26px; height: 26px; border-radius: 50%; border: 2.5px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; transition: all 0.18s; color: transparent; }
  .pick-item.selected .pick-check { background: var(--accent); border-color: var(--accent); color: white; }
  .pick-item-info { flex: 1; min-width: 0; }
  .pick-item-name { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
  .pick-item-addr { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pick-area-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

  /* SCREEN 2 */
  .header { background: var(--text); color: var(--bg); padding: 20px 24px 16px; position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .header h1 { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }
  .header h1 span { color: var(--accent); }
  .back-btn { font-size: 12px; color: rgba(245,240,232,0.5); background: none; border: none; cursor: pointer; font-family: inherit; padding: 4px 8px; }
  .progress-bar-wrap { background: rgba(255,255,255,0.15); border-radius: 99px; height: 6px; overflow: hidden; }
  .progress-bar { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.5s ease; }
  .progress-text { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 6px; }

  /* 출발지 카드 */
  .start-card { margin: 16px 24px 0; background: var(--text); color: var(--bg); border-radius: 16px; padding: 14px 18px; }
  .start-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .start-icon { width: 36px; height: 36px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .start-label { font-size: 11px; color: rgba(245,240,232,0.5); margin-bottom: 2px; }
  .start-name { font-size: 15px; font-weight: 700; }
  .addr-copy-row { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.08); border-radius: 10px; padding: 10px 12px; }
  .addr-copy-text { flex: 1; font-size: 12px; color: rgba(245,240,232,0.7); line-height: 1.4; }
  .copy-btn { flex-shrink: 0; padding: 6px 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-family: inherit; font-size: 11px; font-weight: 700; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
  .copy-btn:active { transform: scale(0.95); }
  .copy-btn.copied { background: var(--done); }

  .area-tabs { display: flex; gap: 8px; padding: 16px 24px 0; overflow-x: auto; scrollbar-width: none; }
  .area-tab { flex-shrink: 0; padding: 8px 16px; border-radius: 99px; border: 2px solid var(--border); background: var(--card); font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; color: var(--muted); }
  .area-tab.active { background: var(--text); border-color: var(--text); color: white; }

  .list-wrap { padding: 16px 24px 100px; display: flex; flex-direction: column; gap: 12px; }

  .delivery-card { background: var(--card); border-radius: 18px; border: 2px solid var(--border); overflow: hidden; transition: all 0.3s ease; }
  .delivery-card.done { opacity: 0.55; border-color: var(--done); }
  .card-main { padding: 16px 18px; display: flex; align-items: flex-start; gap: 14px; cursor: pointer; }
  .card-num { width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; flex-shrink: 0; color: white; }
  .area-아차산로 .card-num { background: var(--area1); }
  .area-자양로 .card-num { background: var(--area2); }
  .area-뚝섬로 .card-num { background: var(--area3); }
  .card-info { flex: 1; min-width: 0; }
  .card-name { font-size: 17px; font-weight: 700; margin-bottom: 3px; }
  .card-addr { font-size: 13px; color: var(--muted); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
  .tag-note { background: #FFF8E0; color: #B07A00; }
  .check-btn { width: 36px; height: 36px; border-radius: 50%; border: 2.5px solid var(--border); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; font-size: 16px; }
  .delivery-card.done .check-btn { background: var(--done); border-color: var(--done); color: white; }

  .card-detail { display: none; padding: 0 18px 16px; border-top: 1.5px solid var(--border); }
  .card-detail.open { display: block; }
  .detail-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .detail-row:last-child { border-bottom: none; }
  .detail-icon { font-size: 16px; width: 24px; text-align: center; flex-shrink: 0; }
  .detail-content { flex: 1; }
  .detail-label { font-size: 10px; color: var(--muted); margin-bottom: 1px; }
  .detail-value { font-size: 14px; font-weight: 500; }

  /* 주소 복사 행 (카드 안) */
  .addr-row { display: flex; align-items: center; gap: 8px; background: var(--bg); border-radius: 10px; padding: 10px 12px; margin-top: 4px; }
  .addr-row-text { flex: 1; font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.4; }
  .copy-btn-dark { flex-shrink: 0; padding: 6px 12px; background: var(--text); color: white; border: none; border-radius: 8px; font-family: inherit; font-size: 11px; font-weight: 700; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
  .copy-btn-dark:active { transform: scale(0.95); }
  .copy-btn-dark.copied { background: var(--done); }

  /* 지도 버튼 */
  .map-btns { display: flex; gap: 8px; margin-top: 12px; }
  .map-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; text-decoration: none; }
  .btn-naver { background: #03C75A; color: white; }
  .btn-kakao { background: #FEE500; color: #3C1E1E; }

  .action-btns { display: flex; gap: 8px; margin-top: 10px; }
  .action-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 5px; }
  .btn-call { background: #E8F5E9; color: #2E7D32; }
  .btn-from-here { background: #E8F0FF; color: #2A7AE0; font-size: 12px; }

  .float-status { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--text); color: white; padding: 14px 28px; border-radius: 99px; font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.25); z-index: 50; white-space: nowrap; }
  .float-done { color: var(--done); font-size: 16px; }
  .section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; padding: 4px 0 8px; }

  /* 토스트 */
  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--done); color: white; padding: 10px 20px; border-radius: 99px; font-size: 13px; font-weight: 700; opacity: 0; transition: opacity 0.3s; z-index: 200; white-space: nowrap; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- SCREEN 1: 담당 고르기 -->
<div class="screen active" id="screenPick">
  <div class="pick-header">
    <h1>오늘 <span>내 담당</span> 고르기</h1>
    <p>ㄱㄴㄷ 순서로 나열되어 있어요.<br>배달할 집을 모두 선택한 뒤 시작하세요.</p>
  </div>
  <div class="pick-selected-bar">
    <div class="count"><span id="selectedCount">0</span>집 선택됨</div>
    <button class="pick-confirm-btn" id="confirmBtn" onclick="confirmSelection()" disabled>배달 시작 →</button>
  </div>
  <div class="pick-list" id="pickList"></div>
</div>

<!-- SCREEN 2: 메인 배달 -->
<div class="screen" id="screenMain">
  <div class="header">
    <div class="header-top">
      <h1>반찬 <span>배달</span> 봉사</h1>
      <button class="back-btn" onclick="goBack()">← 담당 변경</button>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar" style="width:0%"></div>
    </div>
    <div class="progress-text" id="progressText">0 / 0 완료</div>
  </div>

  <!-- 출발지 카드 -->
  <div class="start-card">
    <div class="start-top">
      <div class="start-icon">📍</div>
      <div>
        <div class="start-label">현재 출발지</div>
        <div class="start-name" id="startName">영광교회 (기본 출발지)</div>
      </div>
    </div>
    <div class="addr-copy-row">
      <div class="addr-copy-text" id="startAddr">서울특별시 광진구 아차산로 330</div>
      <button class="copy-btn" onclick="copyAddr(this, document.getElementById('startAddr').textContent)">복사</button>
    </div>
  </div>

  <div class="area-tabs" id="areaTabs"></div>
  <div class="list-wrap" id="listWrap"></div>

  <div class="float-status">
    <span class="float-done" id="floatDone">✓ 0</span>
    <span>집 배달 완료</span>
  </div>
</div>

<div class="toast" id="toast">주소가 복사되었어요!</div>

<script>
const START = { name:'영광교회', addr:'서울특별시 광진구 아차산로 330' };

const allDeliveries = [
  { id:1,  area:'아차산로', name:'강옥순', addr:'서울특별시 광진구 아차산로 88 빌라 B동',    phone:'010-6789-0123', note:'반드시 직접 전달 (문 앞 두고 가면 안 됨)' },
  { id:2,  area:'아차산로', name:'김복순', addr:'서울특별시 광진구 아차산로 312, 101호',      phone:'010-1234-5678', note:'초인종 없음. 문 두드려 주세요.' },
  { id:3,  area:'아차산로', name:'박순희', addr:'서울특별시 광진구 아차산로 298, 302호',      phone:'010-3456-7890', note:'오후 2시 이후 방문 요청' },
  { id:4,  area:'아차산로', name:'윤분이', addr:'서울특별시 광진구 아차산로 344, 지하 101호', phone:'010-7890-1234', note:'지하 계단 주의. 어두움.' },
  { id:5,  area:'자양로',   name:'이금자', addr:'서울특별시 광진구 자양로 11길 66',           phone:'010-3145-1020', note:'차고 뒤쪽 집' },
  { id:6,  area:'자양로',   name:'이정자', addr:'서울특별시 광진구 자양로 15-3, 2층',        phone:'010-2345-6789', note:'' },
  { id:7,  area:'자양로',   name:'조말례', addr:'서울특별시 광진구 자양로 77, 3층',          phone:'010-8901-2345', note:'' },
  { id:8,  area:'자양로',   name:'한금례', addr:'서울특별시 광진구 자양로 5길 14',           phone:'010-9012-3456', note:'청력 불편. 크게 말씀해 주세요.' },
  { id:9,  area:'뚝섬로',   name:'정말순', addr:'서울특별시 광진구 뚝섬로 23-1',            phone:'010-5678-9012', note:'1층 현관 비밀번호 메모 확인' },
  { id:10, area:'뚝섬로',   name:'최영자', addr:'서울특별시 광진구 뚝섬로 55, 101호',       phone:'010-4567-8901', note:'' },
];

const areaHex = { '아차산로':'#E05C2A', '자양로':'#2A7AE0', '뚝섬로':'#4CAF7D' };

let selected = new Set();
let done = new Set();
let currentFilter = 'all';
let startPoint = { ...START };
let myDeliveries = [];

function copyAddr(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '완료!';
    btn.classList.add('copied');
    showToast();
    setTimeout(() => {
      btn.textContent = '복사';
      btn.classList.remove('copied');
    }, 2000);
  }).catch(() => {
    // 구형 브라우저 대비
    const el = document.createElement('textarea');
    el.value = text;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    btn.textContent = '완료!';
    btn.classList.add('copied');
    showToast();
    setTimeout(() => {
      btn.textContent = '복사';
      btn.classList.remove('copied');
    }, 2000);
  });
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

/* SCREEN 1 */
function renderPickList() {
  const sorted = [...allDeliveries].sort((a, b) => a.name.localeCompare(b.name, 'ko'));
  const list = document.getElementById('pickList');
  list.innerHTML = '';
  let lastChar = '';
  sorted.forEach(d => {
    const first = d.name[0];
    if (first !== lastChar) {
      lastChar = first;
      const lbl = document.createElement('div');
      lbl.className = 'alpha-label';
      lbl.textContent = first;
      list.appendChild(lbl);
    }
    const item = document.createElement('div');
    item.className = `pick-item ${selected.has(d.id) ? 'selected' : ''}`;
    item.onclick = () => togglePick(d.id);
    item.innerHTML = `
      <div class="pick-check">${selected.has(d.id) ? '✓' : ''}</div>
      <div class="pick-item-info">
        <div class="pick-item-name">${d.name}님</div>
        <div class="pick-item-addr">${d.addr}</div>
      </div>
      <div class="pick-area-dot" style="background:${areaHex[d.area]}"></div>
    `;
    list.appendChild(item);
  });
}

function togglePick(id) {
  selected.has(id) ? selected.delete(id) : selected.add(id);
  document.getElementById('selectedCount').textContent = selected.size;
  document.getElementById('confirmBtn').disabled = selected.size === 0;
  renderPickList();
}

function confirmSelection() {
  myDeliveries = allDeliveries.filter(d => selected.has(d.id));
  done = new Set();
  startPoint = { ...START };
  currentFilter = 'all';
  document.getElementById('startName').textContent = '영광교회 (기본 출발지)';
  document.getElementById('startAddr').textContent = START.addr;
  buildAreaTabs();
  render();
  updateProgress();
  document.getElementById('screenPick').classList.remove('active');
  document.getElementById('screenMain').classList.add('active');
  window.scrollTo(0, 0);
}

function goBack() {
  document.getElementById('screenMain').classList.remove('active');
  document.getElementById('screenPick').classList.add('active');
  window.scrollTo(0, 0);
}

/* SCREEN 2 */
function buildAreaTabs() {
  const areas = [...new Set(myDeliveries.map(d => d.area))];
  const wrap = document.getElementById('areaTabs');
  wrap.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.className = 'area-tab active';
  allBtn.textContent = '전체 보기';
  allBtn.onclick = () => filterArea('all', allBtn);
  wrap.appendChild(allBtn);
  areas.forEach(area => {
    const btn = document.createElement('button');
    btn.className = 'area-tab';
    btn.textContent = area;
    btn.onclick = () => filterArea(area, btn);
    wrap.appendChild(btn);
  });
}

function filterArea(area, el) {
  currentFilter = area;
  document.querySelectorAll('.area-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function toggleDone(id) {
  done.has(id) ? done.delete(id) : done.add(id);
  updateProgress();
  render();
}

function setStart(addr, name) {
  startPoint = { name: name + '님 댁', addr: addr };
  document.getElementById('startName').textContent = name + '님 댁 (방금 배달)';
  document.getElementById('startAddr').textContent = addr;
  render();
}

function updateProgress() {
  const total = myDeliveries.length;
  const doneCount = done.size;
  const pct = total > 0 ? (doneCount / total * 100).toFixed(0) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${doneCount} / ${total} 완료`;
  document.getElementById('floatDone').textContent = `✓ ${doneCount}`;
}

function toggleDetail(id) {
  document.getElementById('detail-' + id).classList.toggle('open');
}

function render() {
  const wrap = document.getElementById('listWrap');
  const filtered = currentFilter === 'all' ? myDeliveries : myDeliveries.filter(d => d.area === currentFilter);
  wrap.innerHTML = '';
  const groups = {};
  filtered.forEach(d => {
    if (!groups[d.area]) groups[d.area] = [];
    groups[d.area].push(d);
  });

  Object.keys(groups).forEach(area => {
    if (currentFilter === 'all') {
      const label = document.createElement('div');
      label.className = 'section-label';
      label.style.color = areaHex[area];
      label.textContent = `● ${area}`;
      wrap.appendChild(label);
    }

    groups[area].forEach((d, idx) => {
      const isDone = done.has(d.id);
      const safeAddr = d.addr.replace(/'/g, "\\'");
      const safeName = d.name.replace(/'/g, "\\'");

      const naverUrl = `nmap://route/walk?saddr=${encodeURIComponent(startPoint.addr)}&daddr=${encodeURIComponent(d.addr)}&sname=${encodeURIComponent(startPoint.name)}&dname=${encodeURIComponent(d.name+'님 댁')}&appname=com.volunteer.banchan`;
      const kakaoUrl = `kakaomap://route?sName=${encodeURIComponent(startPoint.addr)}&eName=${encodeURIComponent(d.addr)}&by=FOOT`;

      const card = document.createElement('div');
      card.className = `delivery-card area-${d.area} ${isDone ? 'done' : ''}`;
      card.innerHTML = `
        <div class="card-main" onclick="toggleDetail(${d.id})">
          <div class="card-num">${idx + 1}</div>
          <div class="card-info">
            <div class="card-name">${d.name}님</div>
            <div class="card-addr">${d.addr}</div>
            <div class="card-tags">
              ${d.note ? `<span class="tag tag-note">⚠️ 특이사항</span>` : ''}
            </div>
          </div>
          <button class="check-btn" onclick="event.stopPropagation(); toggleDone(${d.id})">
            ${isDone ? '✓' : ''}
          </button>
        </div>
        <div class="card-detail" id="detail-${d.id}">
          <!-- 주소 복사 -->
          <div class="detail-row">
            <div class="detail-icon">📍</div>
            <div class="detail-content">
              <div class="detail-label">주소 (복사 후 지도에 붙여넣기)</div>
              <div class="addr-row">
                <div class="addr-row-text">${d.addr}</div>
                <button class="copy-btn-dark" onclick="copyAddr(this, '${safeAddr}')">복사</button>
              </div>
            </div>
          </div>
          <!-- 전화 -->
          <div class="detail-row">
            <div class="detail-icon">📞</div>
            <div class="detail-content">
              <div class="detail-label">전화번호</div>
              <div class="detail-value">${d.phone}</div>
            </div>
          </div>
          ${d.note ? `
          <div class="detail-row">
            <div class="detail-icon">⚠️</div>
            <div class="detail-content">
              <div class="detail-label">특이사항</div>
              <div class="detail-value">${d.note}</div>
            </div>
          </div>` : ''}
          <!-- 지도 버튼 -->
          <div class="map-btns">
            <a class="map-btn btn-naver" href="${naverUrl}">🗺 네이버 지도</a>
            <a class="map-btn btn-kakao" href="${kakaoUrl}">🗺 카카오맵</a>
          </div>
          <!-- 전화 + 다음 출발 -->
          <div class="action-btns">
            <a class="action-btn btn-call" href="tel:${d.phone}">📞 전화</a>
            <button class="action-btn btn-from-here" onclick="setStart('${safeAddr}', '${safeName}')">
              📍 여기서 다음 출발
            </button>
          </div>
        </div>
      `;
      wrap.appendChild(card);
    });
  });
}

renderPickList();
</script>
</body>
</html>
